<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gradiente horizontal: pink/fuchsia esquerda → roxo escuro direita -->
    <linearGradient id="vg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f5a8ff"/>
      <stop offset="28%"  stop-color="#c026d3"/>
      <stop offset="62%"  stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>

    <!-- Brilho neon externo (halo roxo ao redor do V) -->
    <filter id="neon-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Brilho sutil para as linhas de destaque das bordas internas -->
    <filter id="edge-glow" x="-50%" y="-10%" width="200%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fundo escuro (quase preto, leve azul-marinho) -->
  <rect width="100" height="100" fill="#08081a"/>

  <!-- Forma V: path traçando o contorno completo do V
       top-left outer (10,10) → top-right of left arm (32,10) → V inner tip (50,77)
       → top-left of right arm (68,10) → top-right outer (90,10)
       → outer-right bottom (61,91) → curved V bottom → outer-left (close)
  -->
  <path fill="url(#vg)" filter="url(#neon-glow)"
    d="M 13 10
       Q 10 10 10 13
       L 10 10
       L 32 10
       Q 32 10 33 11
       L 51 78
       L 67 11
       Q 68 10 68 10
       L 90 10
       Q 90 10 90 13
       L 90 10
       L 62 91
       Q 50 98 38 91
       Z"/>

  <!-- Linha de destaque brilhante na borda interna esquerda do V -->
  <line x1="32.5" y1="10" x2="50.5" y2="77"
        stroke="#fce7ff" stroke-width="1.2" stroke-linecap="round"
        filter="url(#edge-glow)" opacity="0.7"/>

  <!-- Linha de destaque brilhante na borda interna direita do V -->
  <line x1="67.5" y1="10" x2="50.5" y2="77"
        stroke="#fce7ff" stroke-width="1.2" stroke-linecap="round"
        filter="url(#edge-glow)" opacity="0.7"/>
</svg>
